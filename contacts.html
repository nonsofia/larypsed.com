---
layout: text
title: contacts
permalink: /contacts.html
---
{% assign c = site.data.contacts %}

<p class="contacts-phone"><a href="tel:{{ c.phone }}">{{ c.phone_display }}</a></p>
<p class="contacts-links">
{% for link in c.links %}
  {% unless forloop.first %}<span class="sep">|</span>{% endunless %}
  <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.label }}</a>
{% endfor %}
</p>
